# Sync an Argo CD application (manual or on push to main).
# Required secrets: ARGOCD_SERVER, ARGOCD_AUTH_TOKEN
# Optional: set ARGOCD_APP_NAME default or pass as input for workflow_dispatch.

name: Argo CD Sync

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Argo CD application name to sync'
        required: true
        default: 'pihole'
      job_name:
        description: 'Optional Job name to sync and follow logs (syncs only this resource)'
        required: false
      wait:
        description: 'Wait for sync to complete'
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      # Optional: only trigger when app configs change (adjust paths to match your repo)
      # - 'apps/**'

jobs:
  argocd-sync:
    runs-on: ubuntu-latest
    env:
      ARGOCD_APP_NAME: ${{ github.event.inputs.app_name || 'pihole' }}

    steps:
      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Login to Argo CD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --grpc-web
        env:
          ARGOCD_OPTS: --insecure   # omit if your server uses a valid TLS cert

      - name: Sync Argo CD application
        run: |
          APP="${{ env.ARGOCD_APP_NAME }}"
          JOB_NAME="${{ github.event.inputs.job_name }}"
          if [ -n "$JOB_NAME" ]; then
            if [ "${{ github.event.inputs.wait }}" = "false" ]; then
              argocd app sync "$APP" --resource "batch:Job:$JOB_NAME" --async
            else
              argocd app sync "$APP" --resource "batch:Job:$JOB_NAME" --wait
            fi
          else
            if [ "${{ github.event.inputs.wait }}" = "false" ]; then
              argocd app sync "$APP" --async
            else
              argocd app sync "$APP" --wait
            fi
          fi

      - name: Wait for job past ContainerCreating
        if: github.event.inputs.job_name != ''
        run: |
          APP="${{ env.ARGOCD_APP_NAME }}"
          JOB_NAME="${{ github.event.inputs.job_name }}"
          MAX_ATTEMPTS=60
          INTERVAL=10
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Polling logs (attempt $i/$MAX_ATTEMPTS)..."
            LOGS=$(argocd app logs "$APP" --name "$JOB_NAME" --kind Job 2>&1) || true
            if echo "$LOGS" | grep -q "ContainerCreating"; then
              echo "Still ContainerCreating, waiting ${INTERVAL}s..."
              sleep $INTERVAL
            elif [ -z "$(echo "$LOGS" | tr -d '\n' | tr -d ' ')" ]; then
              echo "No log output yet, waiting ${INTERVAL}s..."
              sleep $INTERVAL
            else
              echo "No longer ContainerCreating."
              echo "--- Recent logs ---"
              echo "$LOGS"
              exit 0
            fi
          done
          echo "Timeout waiting for job to leave ContainerCreating state"
          exit 1

      - name: Get application status
        run: argocd app get ${{ env.ARGOCD_APP_NAME }} --refresh
