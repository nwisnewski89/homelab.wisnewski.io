# ArgoCD PostSync hook: after a successful sync, publish a message to a RabbitMQ queue
# via the Management HTTP API.
#
# Prerequisites:
#   - Secret (e.g. argocd-postsync-rabbitmq-secret) with keys:
#       RABBITMQ_URL (e.g. https://rabbitmq.example.com), VHOST (e.g. /), QUEUE, USERNAME, PASSWORD
#   - RabbitMQ Management plugin enabled; queue must exist or the user must have permission to create it.
#
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-postsync-notify-rabbitmq
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: notify-rabbitmq
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -ec
            - |
              TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              BODY="{\"event\":\"argocd.postsync\",\"app\":\"${APP_NAME:-unknown}\",\"namespace\":\"${NAMESPACE:-unknown}\",\"timestamp\":\"${TS}\"}"
              # Publish via HTTP API: POST /api/exchanges/{vhost}//publish (default exchange)
              VHOST_ENCODED="$(echo -n "${VHOST}" | sed 's|/|%2F|g')"
              curl -sf -u "${USERNAME}:${PASSWORD}" \
                -H "Content-Type: application/json" \
                -X POST "${RABBITMQ_URL}/api/exchanges/${VHOST_ENCODED}//publish" \
                -d "{\"properties\":{},\"routing_key\":\"${QUEUE}\",\"payload\":\"$(echo -n "$BODY" | sed 's/"/\\"/g')\",\"payload_encoding\":\"string\"}"
              echo "Sent post-sync message to RabbitMQ queue ${QUEUE}"
          env:
            - name: APP_NAME
              value: "my-app"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: argocd-postsync-rabbitmq-secret
                  key: RABBITMQ_URL
            - name: VHOST
              valueFrom:
                secretKeyRef:
                  name: argocd-postsync-rabbitmq-secret
                  key: VHOST
            - name: QUEUE
              valueFrom:
                secretKeyRef:
                  name: argocd-postsync-rabbitmq-secret
                  key: QUEUE
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: argocd-postsync-rabbitmq-secret
                  key: USERNAME
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: argocd-postsync-rabbitmq-secret
                  key: PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
