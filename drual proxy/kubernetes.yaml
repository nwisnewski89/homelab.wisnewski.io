apiVersion: v1
kind: Namespace
metadata:
  name: drupal-file-proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: drupal-file-proxy-nginx
  namespace: drupal-file-proxy
data:
  default.conf.template: |
    server {
        listen 8080;
        server_name ${SERVER_NAME};

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location ^~ /sites/default/files/ {
            limit_except GET HEAD {
                deny all;
            }

            proxy_pass https://${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com;
            proxy_set_header Host ${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com;

            proxy_ssl_server_name on;
            proxy_ssl_name ${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com;

            proxy_set_header Authorization "";
            proxy_set_header Cookie "";

            proxy_hide_header x-amz-id-2;
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-server-side-encryption;

            proxy_buffering on;
            proxy_read_timeout 60s;

            expires 1h;
            add_header Cache-Control "public, max-age=3600" always;
        }

        location / {
            proxy_pass http://${DRUPAL_UPSTREAM};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drupal-file-proxy
  namespace: drupal-file-proxy
  labels:
    app.kubernetes.io/name: drupal-file-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: drupal-file-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: drupal-file-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVER_NAME
              value: sample.com
            - name: S3_BUCKET
              value: drupal-files-prod
            - name: AWS_REGION
              value: us-east-1
            - name: DRUPAL_UPSTREAM
              value: drupal.default.svc.cluster.local:80
          command:
            - /bin/sh
            - -c
            - |
              envsubst '$$SERVER_NAME $$S3_BUCKET $$AWS_REGION $$DRUPAL_UPSTREAM' \
                < /etc/nginx/templates/default.conf.template \
                > /etc/nginx/conf.d/default.conf
              exec nginx -g 'daemon off;'
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: nginx-template
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
              readOnly: true
      volumes:
        - name: nginx-template
          configMap:
            name: drupal-file-proxy-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: drupal-file-proxy
  namespace: drupal-file-proxy
  labels:
    app.kubernetes.io/name: drupal-file-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: drupal-file-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drupal-file-proxy
  namespace: drupal-file-proxy
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: sample.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: drupal-file-proxy
                port:
                  name: http
