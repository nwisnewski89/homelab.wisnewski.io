apiVersion: v1
kind: Namespace
metadata:
  name: drupal-file-proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: drupal-file-proxy-varnish
  namespace: drupal-file-proxy
data:
  default.vcl.template: |
    vcl 4.1;

    backend s3_media {
        .host = "127.0.0.1";
        .port = "8443";
        .connect_timeout = 5s;
        .first_byte_timeout = 60s;
        .between_bytes_timeout = 30s;
    }

    backend drupal {
        .host = "__DRUPAL_HOST__";
        .port = "__DRUPAL_PORT__";
        .connect_timeout = 5s;
        .first_byte_timeout = 60s;
        .between_bytes_timeout = 30s;
    }

    sub vcl_recv {
        if (req.url == "/healthz") {
            return (synth(200, "ok"));
        }

        set req.http.X-Forwarded-Host = req.http.Host;

        if (req.http.X-Forwarded-For) {
            set req.http.X-Forwarded-For = req.http.X-Forwarded-For + ", " + client.ip;
        } else {
            set req.http.X-Forwarded-For = client.ip;
        }

        if (req.url ~ "^/sites/default/files/") {
            if (req.method != "GET" && req.method != "HEAD") {
                return (synth(405, "Method not allowed"));
            }

            set req.backend_hint = s3_media;
            set req.http.Host = "__S3_HOST__";
            unset req.http.Authorization;
            unset req.http.Cookie;

            return (hash);
        }

        set req.backend_hint = drupal;
        return (pass);
    }

    sub vcl_backend_response {
        if (bereq.url ~ "^/sites/default/files/") {
            unset beresp.http.Set-Cookie;
            unset beresp.http.x-amz-id-2;
            unset beresp.http.x-amz-request-id;
            unset beresp.http.x-amz-server-side-encryption;

            if (beresp.status == 200 || beresp.status == 301 || beresp.status == 302) {
                set beresp.ttl = 1h;
                set beresp.grace = 1h;
                set beresp.http.Cache-Control = "public, max-age=3600";
                return (deliver);
            }

            if (beresp.status == 404 || beresp.status == 403) {
                set beresp.ttl = 5m;
                set beresp.grace = 10m;
                set beresp.http.Cache-Control = "public, max-age=300";
                return (deliver);
            }

            set beresp.uncacheable = true;
            set beresp.ttl = 0s;
            return (deliver);
        }

        set beresp.uncacheable = true;
        set beresp.ttl = 0s;
        return (deliver);
    }

    sub vcl_deliver {
        if (req.url ~ "^/sites/default/files/") {
            if (obj.hits > 0) {
                set resp.http.X-Cache = "HIT";
            } else {
                set resp.http.X-Cache = "MISS";
            }
        }
    }
  s3-tls-proxy.conf.template: |
    server {
        listen 127.0.0.1:8443;
        server_name _;

        location / {
            proxy_pass https://${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com;
            proxy_set_header Host ${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com;

            proxy_ssl_server_name on;
            proxy_ssl_name ${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com;

            proxy_set_header Authorization "";
            proxy_set_header Cookie "";
            proxy_buffering on;
            proxy_read_timeout 60s;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drupal-file-proxy
  namespace: drupal-file-proxy
  labels:
    app.kubernetes.io/name: drupal-file-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: drupal-file-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: drupal-file-proxy
    spec:
      containers:
        - name: varnish
          image: varnish:stable-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: S3_BUCKET
              value: drupal-files-prod
            - name: AWS_REGION
              value: us-east-1
            - name: DRUPAL_HOST
              value: drupal.default.svc.cluster.local
            - name: DRUPAL_PORT
              value: "80"
          command:
            - /bin/sh
            - -c
            - |
              S3_HOST="${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com"
              sed \
                -e "s/__S3_HOST__/${S3_HOST}/g" \
                -e "s/__DRUPAL_HOST__/${DRUPAL_HOST}/g" \
                -e "s/__DRUPAL_PORT__/${DRUPAL_PORT}/g" \
                /etc/varnish/default.vcl.template > /tmp/default.vcl
              exec varnishd -F -a :8080 -f /tmp/default.vcl -s malloc,256m
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: varnish-template
              mountPath: /etc/varnish/default.vcl.template
              subPath: default.vcl.template
              readOnly: true
        - name: s3-tls-proxy
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: S3_BUCKET
              value: drupal-files-prod
            - name: AWS_REGION
              value: us-east-1
          ports:
            - name: s3-tls
              containerPort: 8443
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: varnish-template
              mountPath: /etc/nginx/templates/s3-tls-proxy.conf.template
              subPath: s3-tls-proxy.conf.template
              readOnly: true
      volumes:
        - name: varnish-template
          configMap:
            name: drupal-file-proxy-varnish
---
apiVersion: v1
kind: Service
metadata:
  name: drupal-file-proxy
  namespace: drupal-file-proxy
  labels:
    app.kubernetes.io/name: drupal-file-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: drupal-file-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drupal-file-proxy
  namespace: drupal-file-proxy
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: sample.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: drupal-file-proxy
                port:
                  name: http
