apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-drupal-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
  annotations:
    grafana_dashboard_folder: Redis
data:
  redis-drupal-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "index": 0, "text": "DOWN" } }, "type": "value" },
                { "options": { "1": { "color": "green", "index": 1, "text": "UP" } }, "type": "value" }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Redis Up",
          "type": "stat",
          "targets": [{ "expr": "redis_up{job=\"redis-drupal\"}", "legendFormat": "{{pod}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "id": 2,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "Uptime",
          "type": "stat",
          "targets": [{ "expr": "redis_uptime_in_seconds{job=\"redis-drupal\"}", "legendFormat": "{{pod}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "id": 3,
          "title": "Connected Clients",
          "type": "stat",
          "targets": [{ "expr": "redis_connected_clients{job=\"redis-drupal\"}", "legendFormat": "{{pod}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "max": 1, "min": 0 } },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "id": 4,
          "title": "Cache Hit Rate",
          "type": "gauge",
          "targets": [{
            "expr": "rate(redis_keyspace_hits_total{job=\"redis-drupal\"}[5m]) / (rate(redis_keyspace_hits_total{job=\"redis-drupal\"}[5m]) + rate(redis_keyspace_misses_total{job=\"redis-drupal\"}[5m]))",
            "legendFormat": "{{pod}}",
            "refId": "A"
          }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "title": "Memory Used vs Max",
          "type": "timeseries",
          "targets": [
            { "expr": "redis_memory_used_bytes{job=\"redis-drupal\"}", "legendFormat": "used {{pod}}", "refId": "A" },
            { "expr": "redis_memory_max_bytes{job=\"redis-drupal\"}", "legendFormat": "max {{pod}}", "refId": "B" },
            { "expr": "redis_memory_used_rss_bytes{job=\"redis-drupal\"}", "legendFormat": "rss {{pod}}", "refId": "C" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "ops" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "title": "Commands / sec",
          "type": "timeseries",
          "targets": [{ "expr": "rate(redis_commands_processed_total{job=\"redis-drupal\"}[5m])", "legendFormat": "{{pod}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 7,
          "title": "Evicted Keys",
          "type": "timeseries",
          "targets": [{ "expr": "increase(redis_evicted_keys_total{job=\"redis-drupal\"}[5m])", "legendFormat": "{{pod}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "id": 8,
          "title": "Keys per DB",
          "type": "timeseries",
          "targets": [{ "expr": "redis_db_keys{job=\"redis-drupal\"}", "legendFormat": "db{{db}} {{pod}}", "refId": "A" }]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "id": 9,
          "title": "Network I/O",
          "type": "timeseries",
          "targets": [
            { "expr": "rate(redis_net_input_bytes_total{job=\"redis-drupal\"}[5m])", "legendFormat": "in {{pod}}", "refId": "A" },
            { "expr": "rate(redis_net_output_bytes_total{job=\"redis-drupal\"}[5m])", "legendFormat": "out {{pod}}", "refId": "B" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "id": 10,
          "title": "Blocked Clients",
          "type": "timeseries",
          "targets": [{ "expr": "redis_blocked_clients{job=\"redis-drupal\"}", "legendFormat": "{{pod}}", "refId": "A" }]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["redis", "drupal", "cache"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Redis Drupal Cache",
      "uid": "redis-drupal-cache",
      "version": 1
    }
