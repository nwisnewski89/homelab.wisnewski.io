apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: redis-drupal
  namespace: monitoring
  labels:
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
    release: kube-prometheus-stack
spec:
  groups:
    - name: redis-drupal.rules
      rules:
        - alert: RedisDrupalDown
          expr: redis_up{job="redis-drupal"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: Redis for Drupal is down
            description: redis_exporter cannot reach Redis in namespace redis-drupal.

        - alert: RedisDrupalHighMemory
          expr: |
            (
              redis_memory_used_bytes{job="redis-drupal"}
              /
              redis_memory_max_bytes{job="redis-drupal"}
            ) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Redis memory usage above 90%
            description: Consider raising maxmemory or reviewing Drupal cache bins.

        - alert: RedisDrupalEvictions
          expr: increase(redis_evicted_keys_total{job="redis-drupal"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Redis is evicting keys
            description: Drupal cache pressure is causing key evictions; review maxmemory and bin TTLs.

        - alert: RedisDrupalLowHitRate
          expr: |
            (
              rate(redis_keyspace_hits_total{job="redis-drupal"}[5m])
              /
              (
                rate(redis_keyspace_hits_total{job="redis-drupal"}[5m])
                +
                rate(redis_keyspace_misses_total{job="redis-drupal"}[5m])
              )
            ) < 0.8
          for: 15m
          labels:
            severity: info
          annotations:
            summary: Redis cache hit rate below 80%
            description: Drupal may be thrashing cache or warming after deploy.
