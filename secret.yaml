apiVersion: v1
kind: Secret
metadata:
  name: redis-drupal-auth
  namespace: redis-drupal
  labels:
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
type: Opaque
stringData:
  # Replace before production deploy (or manage via Sealed Secrets / External Secrets).
  redis-password: "CHANGE_ME_REDIS_PASSWORD"
  auth.conf: |
    requirepass CHANGE_ME_REDIS_PASSWORD
