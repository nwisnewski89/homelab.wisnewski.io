apiVersion: v1
kind: Service
metadata:
  name: redis-drupal-headless
  namespace: redis-drupal
  labels:
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-drupal
  namespace: redis-drupal
  labels:
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-drupal-metrics
  namespace: redis-drupal
  labels:
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: monitoring
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
      protocol: TCP
