apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-drupal
  namespace: monitoring
  labels:
    app.kubernetes.io/name: redis-drupal
    app.kubernetes.io/component: cache
    # Match your kube-prometheus-stack Helm release name if different.
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - redis-drupal
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-drupal
      app.kubernetes.io/part-of: monitoring
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      scheme: http
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - targetLabel: job
          replacement: redis-drupal
